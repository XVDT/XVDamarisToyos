<audio id="background-music" loop>
        <source src="audiopagina.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // --- LÓGICA DE AUDIO ---
        const music = document.getElementById('background-music');

        // Función para intentar reproducir
        function playMusic() {
            music.play().then(() => {
                // Si tiene éxito, eliminamos los escuchadores para que no se repita el intento
                document.removeEventListener('click', playMusic);
                document.removeEventListener('touchstart', playMusic);
            }).catch(error => {
                console.log("El navegador bloqueó el autoplay. Esperando interacción...");
            });
        }

        // Escuchar el primer clic o toque del usuario para iniciar la música
        document.addEventListener('click', playMusic);
        document.addEventListener('touchstart', playMusic);

        // --- LÓGICA DE PÉTALOS ---
        function createPetal() {
            const petalsContainer = document.getElementById('petals');
            const p = document.createElement('div');
            p.innerHTML = Math.random() > 0.5 ? "🌸" : "🎀";
            const duration = Math.random() * 5 + 7;
            const size = Math.random() * 10 + 15;
            
            p.style.cssText = `
                position: fixed; top: -50px; left: ${Math.random() * 100}vw;
                font-size: ${size}px; opacity: 0.6; pointer-events: none;
                transition: transform ${duration}s linear, top ${duration}s linear;
                z-index: 100;
            `;

            petalsContainer.appendChild(p);
            setTimeout(() => {
                p.style.top = '110vh';
                p.style.transform = `rotate(${Math.random() * 720}deg) translateX(${Math.random() * 100 - 50}px)`;
            }, 100);
            setTimeout(() => p.remove(), duration * 1000);
        }
        setInterval(createPetal, 500);
    </script>
</body>
